services:
  scrum-poker-dev:
    image: node:20-alpine
    container_name: scrum-poker-dev
    working_dir: /app
    command: sh -c "npm ci && npm run dev:full"
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - NUXT_PUBLIC_WS_URL=ws://localhost:8080
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  node_modules:
